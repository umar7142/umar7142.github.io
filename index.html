<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirza Umar | Tech Architect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        /* 🎨 THE VIP DARK MODE CSS (Pro Edition) */
        body { 
            background-color: #0f172a; 
            color: white; 
            /* Yeh hai wo line jis se asli professional font aayega */
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 0;
        }
        .container { 
            max-width: 400px; 
            margin: 60px auto; 
            padding: 20px; 
        }
        .profile-pic { 
            width: 140px; 
            height: 140px; 
            border-radius: 50%; 
            border: 4px solid #38bdf8; 
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.4); 
            margin-bottom: 15px;
        }
        h1 { 
            color: white; 
            margin-top: 15px; 
            margin-bottom: 5px;
            font-weight: 900;
            font-size: 32px;
            letter-spacing: 1px;
        }
        h3 { 
            color: #38bdf8; 
            font-size: 16px; 
            font-weight: 400;
            margin-top: 0;
            margin-bottom: 45px; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .link-btn { 
            display: block; 
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid #334155; 
            padding: 18px; 
            margin: 15px 0; 
            border-radius: 12px; 
            color: white; 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Hover Effect (Jadu - Ab Zyada Smooth Hai) */
        .link-btn:hover { 
            background: #38bdf8; 
            border-color: #38bdf8;
            box-shadow: 0 10px 20px -10px rgba(56, 189, 248, 0.7); 
            color: #0f172a; 
            transform: translateY(-4px);
        }
        .footer { 
            margin-top: 60px; 
            font-size: 12px; 
            color: #64748b; 
            border-top: 1px solid #1e293b;
            padding-top: 25px;
            font-weight: 300;
        }
        .status-dot {
            color: #22c55e;
            font-size: 14px;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://ui-avatars.com/api/?name=Mirza+Umar&background=0D8ABC&color=fff&size=256&bold=true&font-size=0.4" alt="CEO Mirza" class="profile-pic">
        
        <h1>Mirza Umar</h1>
        <h3>CEO & Tech Architect 🚀</h3>

        <a href="#" class="link-btn">💼 My GitHub Empire</a>
        <a href="#" class="link-btn">📱 OFitPro App (Beta)</a>
        <a href="#" class="link-btn">🐍 Python AI Projects</a>
        <a href="#" class="link-btn">📸 Instagram Vibe</a>

        <div class="footer">
            <p><span class="status-dot">●</span> System Status: Online</p>
            <p>Location: Rahim Yar Khan, PK</p>
            <p>© 2026 Tycoon Industries</p>
        </div>
    </div>

</body>
</html>
