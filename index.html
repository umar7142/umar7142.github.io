<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFitPro | Interactive Web UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="watch-container">
    <div class="action-button" id="sideBtn"></div>
    <div class="crown"></div>
    
    <div class="watch-case">
        <div class="watch-screen">
            <div class="glow"></div>
            
            <div class="status-bar">
                <span>🔋 84%</span>
                <span><span style="color:#38bdf8;">🌐</span> Web Mode</span>
            </div>

            <div class="screen-content active" id="mainScreen">
                <div class="time-container">
                    <div class="time" id="clock">00:00</div>
                    <div class="date" id="date">DAY, MON DD</div>
                </div>

                <div class="widgets">
                    <div class="widget">
                        <div class="widget-icon heart">❤️</div>
                        <div class="widget-value" id="bpm">72</div>
                        <div class="widget-label">BPM (Demo)</div>
                    </div>
                    <div class="widget">
                        <div class="widget-icon steps">👟</div>
                        <div class="widget-value" id="steps">6,432</div>
                        <div class="widget-label">Steps (Demo)</div>
                    </div>
                </div>
                <div style="text-align:center; color:#64748b; font-size:0.75rem;">
                    Click Orange Button ➡️
                </div>
            </div>

            <div class="screen-content" id="menuScreen">
                <div style="text-align:center; margin-bottom:20px; font-weight:bold;">APPS MENU</div>
                <div class="app-grid">
                    <div class="app-icon" style="background:#f97316;">👟</div>
                    <div class="app-icon" style="background:#f43f5e;">❤️</div>
                    <div class="app-icon" style="background:#38bdf8;">🌤️</div>
                    <div class="app-icon" style="background:#22c55e;">💬</div>
                    <div class="app-icon" style="background:#a855f7;">🎵</div>
                    <div class="app-icon" style="background:#eab308;">⚙️</div>
                </div>
                <div style="text-align:center; color:#64748b; font-size:0.75rem; margin-top:20px;">
                    TremorTrack OSINT App
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    // 🧠 JAVASCRIPT FOR INTERACTION

    // 1. Button Click Logic (Screen Switcher)
    const sideBtn = document.getElementById('sideBtn');
    const mainScreen = document.getElementById('mainScreen');
    const menuScreen = document.getElementById('menuScreen');
    let isMainScreen = true;

    sideBtn.addEventListener('click', () => {
        // Button dabane par "active" class toggle karo
        if (isMainScreen) {
            mainScreen.classList.remove('active');
            menuScreen.classList.add('active');
        } else {
            menuScreen.classList.remove('active');
            mainScreen.classList.add('active');
        }
        isMainScreen = !isMainScreen; // State badal do
        
        // Button press animation
        sideBtn.style.transform = 'scale(0.95)';
        setTimeout(() => sideBtn.style.transform = 'scale(1)', 100);
    });

    // 2. Live Clock & Demo Data (Same as before)
    function updateTime() {
        const now = new Date();
        let hours = now.getHours();
        let minutes = now.getMinutes();
        hours = hours < 10 ? '0' + hours : hours;
        minutes = minutes < 10 ? '0' + minutes : minutes;
        document.getElementById('clock').innerText = `${hours}:${minutes}`;

        const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
        const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
        const dayName = days[now.getDay()];
        const monthName = months[now.getMonth()];
        let dateNum = now.getDate();
        dateNum = dateNum < 10 ? '0' + dateNum : dateNum;
        document.getElementById('date').innerText = `${dayName}, ${monthName} ${dateNum}`;
    }
    setInterval(updateTime, 1000);
    updateTime();

    let currentBpm = 72;
    setInterval(() => {
        let change = Math.floor(Math.random() * 3) - 1; 
        currentBpm += change;
        if(currentBpm < 65) currentBpm = 65;
        if(currentBpm > 85) currentBpm = 85;
        document.getElementById('bpm').innerText = currentBpm;
    }, 3000);

    let currentSteps = 6432;
    setInterval(() => {
        currentSteps += Math.floor(Math.random() * 3); 
        document.getElementById('steps').innerText = currentSteps.toLocaleString();
    }, 2500);

</script>

</body>
</html>
